        scene1: { text: "그 면접이 끝나고, 나에게는 하나의 습관이 생겼다.", sub: "자기 전에 그 순간을 떠올리는 것. 면접관의 질문, 하얘진 머리, 입에서 흘러나온 횡설수설. 매일 밤 그 장면이 돌아왔고, 돌아올 때마다 같은 결론에 도달했다 — '그때 제대로 대답했으면 됐는데.'", choice: {"prompt":"어떤 순간으로 돌아가볼까요?","options":[{"id":"a","label":"면접실 안, 머리가 하얘졌던 그 순간으로 돌아간다","next":"scene2a"},{"id":"b","label":"일주일 뒤, 불합격 메일을 받은 순간으로 간다","next":"scene2b"}]} },
        scene2a: { text: "\"본인의 약점이 뭐라고 생각하세요?\"", sub: "그 질문을 들은 순간을 기억한다. 준비한 대답이 있었다. 카페에서 노트를 펼치고 적었던 34개 질문 중 15번. 세 줄을 쓰고, 지우고, 다시 쓴 항목이었다. 그런데 입을 여는 순간 문장이 흩어졌다. 2초. 면접관이 고개를 기울이는 게 보였다. 3초. 물을 한 모금 마셨다. 그 사이에 무슨 말을 했는지, 지금도 기억나지 않는다. 기억나는 건 손이 차가웠다는 것. 목소리가 떨렸다는 것. 그리고 '끝났다'고 생각했다는 것.", choice: {"prompt":"이 순간을 어떻게 마주하고 싶나요?","options":[{"id":"a","label":"그때의 나에게 준비했던 시간을 떠올려주고 싶다","next":"scene3a"},{"id":"b","label":"그 순간의 감정을 그냥 느끼게 두고 싶다","next":"scene3b"}]} },
        scene2b: { text: "일주일 동안 매일 아침 메일함을 열었다.", sub: "아무것도 오지 않은 날에는 안도와 불안이 동시에 왔다. 그 사이에도 출근하고, 밥을 먹고, 잠을 잤다. 아무에게도 면접 결과를 기다리고 있다고 말하지 않았다. 8일째 아침, 메일이 왔다. '안타깝게도'라는 세 글자가 먼저 보였다. 나머지는 읽지 않았다. 핸드폰을 내려놓고 한참을 가만히 있었다. 그 순간 느꼈던 건 슬픔보다는 뭔가 텅 빈 느낌이었다.", choice: {"prompt":"이 순간을 어떻게 마주하고 싶나요?","options":[{"id":"a","label":"그때의 나에게 준비했던 시간을 떠올려주고 싶다","next":"scene3a"},{"id":"b","label":"그 순간의 감정을 그냥 느끼게 두고 싶다","next":"scene3b"}]} },
        scene3a: { text: "그 면접을 준비하던 시간으로 돌아가본다.", sub: "두 달 전 어느 밤, 자기소개 항목을 고치다가 새벽 2시를 넘겼다. 11번째 수정이었다. 면접 전날에는 옷장 앞에서 셔츠를 세 번 바꿔 입었다. 알람을 세 개 맞추고 잠들었다. 그때의 나는 최선을 다하고 있었다. 결과를 몰랐지만, 할 수 있는 건 다 했다. 그 시간은 8초 때문에 사라지지 않는다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"그 면접실을 나온 뒤 내가 뭘 했는지 기억해본다","next":"scene4a"},{"id":"b","label":"그때의 나에게 하고 싶은 말이 있다","next":"scene4b"}]} },
        scene3b: { text: "면접관의 펜이 멈추던 그 순간, 머릿속에서 '됐다, 끝났다'라는 말이 떠올랐다.", sub: "그 뒤에도 질문이 두 개 더 있었고, 대답도 했다. 하지만 내가 기억하는 건 그 순간뿐이다. 나온 뒤 화장실 거울 앞에 섰을 때 손이 떨리고 있었다. 나는 그 떨림이 부끄러웠다. 지금 생각하면 — 손이 떨린 건, 아무렇지 않지 않았기 때문이다. 간절하지 않았다면 떨리지 않았을 것이다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"그 면접실을 나온 뒤 내가 뭘 했는지 기억해본다","next":"scene4a"},{"id":"b","label":"그때의 나에게 하고 싶은 말이 있다","next":"scene4b"}]} },
        scene4a: { text: "건물 밖으로 나와서 편의점에서 물을 하나 샀다. 벤치에 앉아서 20분쯤 있었다.", sub: "아무에게도 전화하지 않았다. 그냥 지나가는 사람들을 봤다. 그때는 몰랐다 — 그 20분이 내가 나를 추스르는 시간이었다는 걸. 나는 그 자리에서 무너지지 않았다. 일어나서 지하철을 탔다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"나는 다시 면접실의 문을 열 것이다","next":"scene5a"},{"id":"b","label":"오늘은 여기까지만 생각해도 된다","next":"scene5b"}]} },
        scene4b: { text: "그때의 나에게 말을 건다.", sub: "면접실 의자에 앉아 있는 나. 손이 차갑고, 목소리가 떨리고, 머릿속이 하얗게 된 그 나. 지금의 내가 그 나를 본다. 완벽하게 해내지 못한 것과, 부족한 것은 다른 거라고. 그리고 그 의자에 앉아 있었다는 것 자체가, 도망치지 않았다는 뜻이라고.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"나는 다시 면접실의 문을 열 것이다","next":"scene5a"},{"id":"b","label":"오늘은 여기까지만 생각해도 된다","next":"scene5b"}]} },
        scene5a: { text: "다음 면접에서도 떨릴 것이다. 또 횡설수설할 수도 있다.", sub: "하지만 나는 하나를 알게 됐다 — 떨려도 물을 마실 수 있다는 것. 횡설수설해도 자리에서 일어날 수 있다는 것. 그리고 일어난 다음 날에도 알람은 울린다는 것.", choice: null },
        scene5b: { text: "오늘은 아무 계획도 세우지 않는다.", sub: "그냥 집에 가서 밥을 먹고, 샤워를 하고, 눕는다. 다음에 뭘 할지는 내일 생각한다. 오늘 내가 확인한 건, 실망할 만큼 간절했던 무언가가 나에게 있었다는 것이다.", choice: null },
      },
      future: {
        scene1: { text: "지금으로부터 10년 뒤, 당신은 그 면접을 떠올리고 있다.", sub: "이상하게도 면접관의 얼굴이 잘 기억나지 않는다. 질문은 기억난다 — \"약점이 뭐냐\"는 질문. 그리고 머리가 하얘졌다는 것. 하지만 그것 말고는 흐릿하다. 10년 전에는 매일 밤 떠오르던 장면인데. 지금은 일부러 떠올려야 겨우 윤곽이 잡힌다.", choice: {"prompt":"어떤 시선을 보내고 싶나요?","options":[{"id":"a","label":"그때의 나에게 돌아가서 뭔가를 말해준다","next":"scene2a"},{"id":"b","label":"그 면접 이후에 무슨 일이 있었는지를 따라가본다","next":"scene2b"}]} },
        scene2a: { text: "10년 뒤의 당신이, 면접실 앞 복도에 서 있는 그때의 나를 본다.", sub: "셔츠를 세 번 바꿔 입고 온 게 보인다. 손에 쥔 서류가 살짝 구겨져 있다. 긴장한 게 여기서도 보인다. 10년 뒤의 당신은 이 사람이 앞으로 20분 뒤에 횡설수설할 거라는 걸 안다. 그리고 그 뒤에 어떤 일들이 있었는지도 안다. 이 사람은 아직 모른다.", choice: {"prompt":"그때의 나에게 무슨 말을 건네고 싶나요?","options":[{"id":"a","label":"결과는 중요하지 않았다고 말해준다","next":"scene3a"},{"id":"b","label":"힘들겠지만 괜찮아질 거라고 말해준다","next":"scene3b"}]} },
        scene2b: { text: "그 면접 이후, 많은 일이 있었다.", sub: "불합격 메일을 받고 며칠간 아무것도 하지 않았다. 그 다음 주에 다른 공고를 봤다. 지원서를 쓰다가 닫았다. 또 열었다. 그렇게 몇 번을 반복하다가 결국 제출했다. 그 뒤의 일들은 — 지금 여기서 보면 — 그 면접과 아무 관련이 없는 방향으로 흘러갔다. 10년이 지난 지금, 그때 떨어진 그 회사의 이름을 일상에서 떠올리는 일은 거의 없다.", choice: {"prompt":"그때의 나에게 무슨 말을 건네고 싶나요?","options":[{"id":"a","label":"그때의 나에게 이 이야기를 들려준다","next":"scene3a"},{"id":"b","label":"그 면접이 남긴 것이 무엇이었는지 생각해본다","next":"scene3b"}]} },
        scene3a: { text: "10년 뒤의 당신이 그때의 나에게 말한다.", sub: "\"그 면접은 네가 생각하는 것만큼 중요하지 않았어.\" 이 말은 사실이다. 하지만 지금 그 말을 들은 그때의 나는 아마 믿지 않을 것이다. 왜냐하면 그때의 나에게는 그것이 전부였으니까. 10년 뒤의 당신은 그걸 안다. 그래서 다른 말을 덧붙인다 — \"중요하지 않았다는 게 아니라, 그것만이 전부는 아니었다는 뜻이야.\"", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"그때의 나는 그 말을 듣고 어떤 표정을 지을까","next":"scene4a"},{"id":"b","label":"그때의 나에게 하나만 더 말해준다","next":"scene4b"}]} },
        scene3b: { text: "그 면접이 남긴 것.", sub: "10년이 지나서 보면, 그 면접이 남긴 건 '불합격'이 아니었다. 남은 건 — 긴장되는 자리에서 끝까지 앉아 있을 수 있다는 경험이었다. 횡설수설해도 세상이 끝나지 않는다는 것. 그리고 실패한 다음 날에도 밥을 먹을 수 있다는 것. 그때는 몰랐지만, 그것들은 이후에 꽤 자주 써먹게 되는 종류의 경험이었다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"그때의 나는 그 말을 듣고 어떤 표정을 지을까","next":"scene4a"},{"id":"b","label":"그때의 나에게 하나만 더 말해준다","next":"scene4b"}]} },
        scene4a: { text: "그때의 나는 아마 고개를 저을 것이다.", sub: "\"그럴 리가요. 지금 저한테 그런 말 해봐야 소용없어요.\" 그때의 나는 그렇게 말할 것이다. 10년 뒤의 당신은 웃는다. 그 완고함이 낯익기 때문이다. 그래도 괜찮다. 지금 당장 믿지 않아도 된다. 시간이 그 일을 한다. 당신이 여기 있다는 것 자체가 증거이다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"그때의 나를 그냥 두고 돌아온다","next":"scene5a"},{"id":"b","label":"그때의 나 옆에 잠깐 앉아 있는다","next":"scene5b"}]} },
        scene4b: { text: "10년 뒤의 당신이 하나만 더 말한다.", sub: "\"네가 면접에서 떨어진 건 네가 부족해서가 아니야. 그 자리에 앉을 수 있는 사람이 부족한 사람일 리가 없어.\" 이 말을 10년 전의 나는 — 아마 울 것이다. 그때는 아무도 그런 말을 해주지 않았으니까. 스스로에게도 하지 못했으니까.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"그때의 나를 그냥 두고 돌아온다","next":"scene5a"},{"id":"b","label":"그때의 나 옆에 잠깐 앉아 있는다","next":"scene5b"}]} },
        scene5a: { text: "10년 뒤의 당신은 돌아온다. 그때의 나를 그 자리에 두고.", sub: "그때의 나는 거기서 자기 방식대로 버텨낼 것이다. 그리고 결국 여기까지 올 것이다. 당신이 이미 알고 있는 것처럼.", choice: null },
        scene5b: { text: "10년 뒤의 당신이 그때의 나 옆에 앉는다. 아무 말 없이.", sub: "편의점 벤치에, 혹은 침대 위에, 혹은 지하철 안에. 어디든 상관없다. 그냥 옆에 앉아 있는다. 그것만으로도 그때의 나는 — 혼자가 아니었다는 걸 나중에야 알게 될 것이다.", choice: null },

      observer: {
        scene1: { text: "마감일이 지난 뒤, 이 사람은 아무에게도 말하지 않았다.", sub: "지원서를 제출하지 않았다는 것을. 같이 가자고 했던 친구에게는 \"좀 더 생각해보기로 했어\"라고만 말했다. 사실은 생각하다가 놓친 것이었다. 마감 3일 전부터 매일 밤 지원서 파일을 열었다. 이름과 학번까지는 적었다. 그다음 칸 — '지원 동기' — 앞에서 커서가 깜빡이다가, 노트북을 닫았다. 세 번. 같은 일을 세 번 반복하고 나서 마감일이 지났다.", choice: {"prompt":"이 사람의 어떤 순간을 따라가볼까요?","options":[{"id":"a","label":"지원서를 열었다 닫았던 그 밤으로 돌아간다","next":"scene2a"},{"id":"b","label":"친구가 교환학생을 다녀온 뒤의 순간으로 간다","next":"scene2b"}]} },
        scene2a: { text: "마감 이틀 전 밤, 이 사람은 책상 앞에 앉아 있었다.", sub: "노트북 화면에 지원서 양식이 열려 있었다. '지원 동기' 칸. 커서가 깜빡인다. 이 사람은 첫 문장을 세 번 썼다가 지웠다. \"새로운 환경에서\"로 시작하는 문장은 너무 뻔했고, \"어릴 때부터\"로 시작하는 문장은 거짓말 같았다. 이 사람이 진짜 쓰고 싶었던 건 \"잘 모르겠지만 가보고 싶습니다\"였다. 하지만 그게 지원 동기가 될 수 있을까. 23시 47분. 이 사람은 노트북을 닫았다. 내일 쓰자고 생각했다. 내일의 이 사람도 같은 생각을 했다.", choice: {"prompt":"이 사람에게 어떤 시선을 건네고 싶나요?","options":[{"id":"a","label":"이 사람이 무엇을 두려워했는지 본다","next":"scene3a"},{"id":"b","label":"이 사람이 가고 싶었다는 것 자체에 주목한다","next":"scene3b"}]} },
        scene2b: { text: "6개월 뒤, 친구가 돌아왔다.", sub: "공항에서 만났을 때 친구는 헤어스타일이 바뀌어 있었고, 영어 섞인 말버릇이 생겨 있었다. 밥을 먹으면서 친구는 사진을 보여줬다. 기숙사, 캠퍼스, 친구들. \"너도 같이 갔으면 진짜 좋았을 텐데.\" 그 말에 이 사람은 웃었다. 집에 돌아와서는 웃지 않았다. 침대에 누워서 천장을 봤다. 친구가 달라진 게 부러운 건지, 자신이 달라지지 않은 게 답답한 건지 구분이 안 됐다.", choice: {"prompt":"이 사람에게 어떤 시선을 건네고 싶나요?","options":[{"id":"a","label":"이 사람이 무엇을 두려워했는지 본다","next":"scene3a"},{"id":"b","label":"이 사람이 가고 싶었다는 것 자체에 주목한다","next":"scene3b"}]} },
        scene3a: { text: "밖에서 보면, 이 사람이 두려워한 것은 '교환학생 실패'가 아니었다.", sub: "이 사람은 성적도 괜찮았고, 영어도 못하지 않았다. 서류가 부족한 것도 아니었다. 이 사람이 두려워한 건 — '가서 별것 아닌 사람이라는 게 확인되는 것'이었다. 여기서는 익숙한 것들 사이에서 버틸 수 있었다. 거기서는 모든 게 처음이고, 처음부터 증명해야 했다. 이 사람은 그 증명을 견딜 자신이 없었다. 그래서 지원서를 닫았다. 세 번. 하지만 세 번 다 열기는 했다. 그것도 사실이다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"지원서를 닫은 것과 열지 않은 것은 다르다는 것을 본다","next":"scene4a"},{"id":"b","label":"이 사람의 두려움이 비합리적이었는지 따져본다","next":"scene4b"}]} },
        scene3b: { text: "이 사람은 지원서를 열지 않았다면 더 편했을 것이다. 그런데 세 번이나 열었다.", sub: "설명회에 갔다. 양식을 다운받았다. 이름과 학번을 적었다. 여기까지의 행동은 '가고 싶다'는 마음 없이는 일어나지 않는다. 이 사람은 자신을 '겁먹어서 못 간 사람'으로 기억하고 있다. 하지만 밖에서 보면, 설명회장 의자에 앉아 있던 사람, 양식을 다운받은 사람, 이름을 적은 사람이기도 하다. 결과적으로 가지 않았다는 것이 그 행동들을 지우지는 않는다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"지원서를 닫은 것과 열지 않은 것은 다르다는 것을 본다","next":"scene4a"},{"id":"b","label":"이 사람의 두려움이 비합리적이었는지 따져본다","next":"scene4b"}]} },

        scene3a: { text: "내가 무서웠던 건 교환학생 자체가 아니었다.", sub: "성적도 괜찮았고, 영어도 못하진 않았다. 내가 무서웠던 건 — 가서 별것 아닌 사람이라는 게 드러나는 것이었다. 여기서는 익숙한 것들 사이에서 견딜 수 있었다. 거기서는 처음부터 증명해야 했다. 나는 그걸 견딜 자신이 없었다. 그래서 닫았다. 하지만 — 세 번 다 열긴 했다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"닫은 것과 열지 않은 건 다르다","next":"scene4a"},{"id":"b","label":"그 두려움은 당연한 거였다","next":"scene4b"}]} },

        scene4a: { text: "나는 아무것도 하지 않은 사람이 아니다.", sub: "마지막 한 걸음을 떼지 못한 사람이다. 그 차이는 작아 보이지만 의미가 다르다. 아무것도 하지 않은 사람은 후회하지 않는다. 내가 후회한다는 건 — 가고 싶었다는 뜻이다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"다음에 비슷한 문 앞에 서면 — 나는 열 것이다","next":"scene5a"},{"id":"b","label":"지금은 이 후회를 안고 있어도 괜찮다","next":"scene5b"}]} },
        scene4b: { text: "낯선 곳에서 처음부터 시작하는 게 두려운 건 당연하다.", sub: "나는 비정상적으로 겁이 많은 게 아니었다. 정상적으로 불안한 거였다. 다만 나는 그 불안을 '나는 겁쟁이다'로 번역해버렸다. 불안을 느끼는 것과, 불안 때문에 스스로를 겁쟁이로 부르는 건 다른 일이다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"다음에 비슷한 문 앞에 서면 — 나는 열 것이다","next":"scene5a"},{"id":"b","label":"지금은 이 후회를 안고 있어도 괜찮다","next":"scene5b"}]} },
        scene5a: { text: "교환학생 마감은 지났다. 하지만 낯선 문은 그것만 있는 게 아니다.", sub: "다음에 비슷한 문 앞에 서면 — 또 망설일 수 있다. 또 열었다 닫을 수 있다. 하지만 이번에는 안다. 닫은 것과 열지 않은 건 다르다는 것. 그리고 나는 여는 쪽의 사람이라는 것.", choice: null },
        scene5b: { text: "나는 교환학생을 가지 않았다. 그리고 그 뒤에도 살았다.", sub: "학점을 땄고, 졸업했고, 일을 시작했다. 가끔 친구 사진을 보며 아쉬워했지만 멈추진 않았다. 이 후회가 남긴 건 — '나는 가고 싶었다'는 사실이다. 그 마음은 사라지지 않았고, 다른 형태로 나타날 것이다.", choice: null },

      future: {
        scene1: { text: "10년 뒤, 당신은 그 교환학생 마감일을 떠올리고 있다.", sub: "정확한 날짜는 기억나지 않는다. 11월이었던 것 같기도 하고, 10월이었던 것 같기도 하다. 기억나는 건 노트북 화면에 열려 있던 지원서 양식. '지원 동기' 칸 앞에서 깜빡이던 커서. 그리고 닫았다는 것. 10년 전의 나는 그걸 인생의 분기점이라고 생각했다. 10년 뒤의 당신은 — 좀 다르게 본다.", choice: {"prompt":"어떤 시선을 보내고 싶나요?","options":[{"id":"a","label":"그때의 나에게 가본다","next":"scene2a"},{"id":"b","label":"교환학생을 가지 않은 뒤에 무슨 일이 있었는지 따라가본다","next":"scene2b"}]} },
        scene2a: { text: "10년 뒤의 당신이, 마감 이틀 전 밤의 책상 앞에 앉아 있는 그때의 나를 본다.", sub: "노트북이 열려 있다. 지원서 양식. 이름, 학번까지 적혀 있다. 커서가 깜빡이고 있다. 이 사람은 23시 47분에 이 노트북을 닫을 것이다. 10년 뒤의 당신은 그걸 안다. 그리고 — 닫은 뒤에도 괜찮았다는 것도 안다.", choice: {"prompt":"그때의 나에게 무슨 말을 건네고 싶나요?","options":[{"id":"a","label":"안 가도 괜찮았다고 말해준다","next":"scene3a"},{"id":"b","label":"두려웠던 게 당연했다고 말해준다","next":"scene3b"}]} },
        scene2b: { text: "교환학생을 가지 않은 뒤의 시간을 따라가본다.", sub: "그 학기, 이 사람은 전공 수업에서 프로젝트를 하나 맡았다. 원래는 교환학생을 갈 예정이라 빠지려고 했던 수업이었다. 거기서 만난 사람들과 꽤 오래 연락을 이어갔다. 교환학생을 갔더라면 이 프로젝트는 하지 않았을 것이다. 10년 뒤의 당신은 이것을 '안 가서 다행이었다'고 말하려는 게 아니다. 다만 — 삶은 하나의 선택으로 결정되지 않는다는 걸 말하려는 것이다.", choice: {"prompt":"그때의 나에게 무슨 말을 건네고 싶나요?","options":[{"id":"a","label":"그때의 나에게 이 이야기를 들려준다","next":"scene3a"},{"id":"b","label":"그 뒤의 시간이 채워준 것들을 생각해본다","next":"scene3b"}]} },
        scene3a: { text: "10년 뒤의 당신이 그때의 나에게 말한다.", sub: "\"안 가도 괜찮았어.\" 이 말은 — 반은 맞고 반은 틀리다. 안 가도 괜찮긴 했다. 살았으니까. 하지만 그때의 아쉬움이 가짜였다는 뜻은 아니다. 10년 뒤의 당신은 이렇게 말을 고친다 — \"안 간 것 때문에 네가 부족한 사람이 된 건 아니야. 넌 다른 방식으로 채웠어.\"", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"그때의 나는 뭐라고 할까","next":"scene4a"},{"id":"b","label":"하나만 더 말해준다","next":"scene4b"}]} },
        scene3b: { text: "교환학생을 가지 않은 자리에 다른 것들이 들어왔다.", sub: "그걸 '대체'라고 부르기는 어렵다. 교환학생은 교환학생이고, 프로젝트는 프로젝트이니까. 하지만 10년의 시간이 보여주는 건, 하나의 문이 닫혔을 때 세상이 끝나지 않았다는 사실이다. 다른 문이 열렸다 — 의도적으로 연 것도 있고, 우연히 열린 것도 있다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"그때의 나는 뭐라고 할까","next":"scene4a"},{"id":"b","label":"하나만 더 말해준다","next":"scene4b"}]} },
        scene4a: { text: "그때의 나는 아마 이렇게 말할 것이다.", sub: "\"그래도 그때 냈어야 했는데.\" 10년 뒤의 당신은 고개를 끄덕인다. \"그래, 냈으면 좋았겠지. 그런데 — 안 냈다고 해서 네가 겁쟁이인 건 아니야. 두려웠던 거고, 두려운 건 자연스러운 거야.\" 그때의 나는 아마 바로 동의하지는 않을 것이다. 그래도 괜찮다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"그때의 나를 두고 돌아온다","next":"scene5a"},{"id":"b","label":"그때의 나 옆에 잠깐 앉아 있는다","next":"scene5b"}]} },
        scene4b: { text: "10년 뒤의 당신이 하나만 더 말한다.", sub: "\"그때 네가 겁먹은 게 — 사실은 '가고 싶다'는 마음이 컸기 때문이야. 아무래도 상관없는 일에는 겁먹지 않거든.\" 이 말을 10년 전의 나는 — 생각해본 적이 없을 것이다. 두려움과 간절함이 같은 곳에서 온다는 걸.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"그때의 나를 두고 돌아온다","next":"scene5a"},{"id":"b","label":"그때의 나 옆에 잠깐 앉아 있는다","next":"scene5b"}]} },
        scene5a: { text: "10년 뒤의 당신은 돌아온다.", sub: "그때의 나는 노트북을 닫고, 침대에 누워서, 후회할 것이다. 하지만 결국 — 여기까지 올 것이다. 교환학생을 가지 않은 채로. 그래도.", choice: null },
        scene5b: { text: "10년 뒤의 당신이 그때의 나 옆에 앉는다. 책상 앞에.", sub: "커서가 깜빡이는 화면을 같이 본다. 닫아도 괜찮다. 열어도 괜찮다. 어느 쪽이든 — 10년 뒤에 여기까지 오게 된다. 그걸 아는 것만으로도, 그때의 나는 조금 덜 무거울 수 있을 것이다.", choice: null },

      observer: {
        scene1: { text: "그 다툼이 있은 뒤, 이 두 사람의 카톡 대화창에는 3개월째 아무 글자도 올라오지 않고 있다.", sub: "마지막 메시지는 \"알겠어 그럼\"이었다. 누가 보냈는지는 중요하지 않다. 그 네 글자 이후로 아무도 먼저 말을 걸지 않았다. 시작은 여행이었다. 같이 가기로 한 여행. 한 사람이 일방적으로 일정을 바꿨고, 다른 한 사람이 서운해했고, \"너는 맨날 그러잖아\"라는 말이 나왔고, 거기서부터 쌓여 있던 것들이 한꺼번에 쏟아졌다.", choice: {"prompt":"이 사람의 어떤 순간을 따라가볼까요?","options":[{"id":"a","label":"다툼이 벌어진 그 순간으로 돌아간다","next":"scene2a"},{"id":"b","label":"다툼이 있기 전, 불만이 쌓이던 시간을 본다","next":"scene2b"}]} },
        scene2a: { text: "그 대화는 카톡으로 시작됐다.", sub: "\"나 그날 좀 어려울 것 같은데, 하루 뒤로 밀면 안 될까?\" 이 사람은 그 메시지를 보고 바로 답하지 않았다. 5분. 화면을 보면서 여러 문장을 머릿속에서 만들었다가 지웠다. 결국 보낸 건 — \"또?\" 한 글자. 상대방이 \"또가 뭐야\"라고 답했고, 거기서부터 통화로 넘어갔다. 통화는 40분이었다. 처음 10분은 여행 일정 이야기였다. 나머지 30분은 — 지난 1년 동안 말하지 않았던 것들이었다.", choice: {"prompt":"이 사람에게 어떤 시선을 건네고 싶나요?","options":[{"id":"a","label":"이 사람의 '또?'에 담겨 있던 것을 본다","next":"scene3a"},{"id":"b","label":"상대방이 들은 '또?'가 어떻게 느껴졌는지 본다","next":"scene3b"}]} },
        scene2b: { text: "이 두 사람의 불만은 어느 하루에 생긴 게 아니었다.", sub: "3개월 전 약속을 당일에 취소한 일. 2개월 전 단톡에서 읽씹당한 일. 한 달 전 다른 친구와 먼저 약속을 잡은 일. 하나하나는 말할 만큼 크지 않았다. \"그럴 수 있지\" 하고 넘겼다. 하지만 넘긴 것들은 사라지지 않고 어딘가에 쌓였다. 여행 일정은 — 그 쌓인 것들의 맨 위에 올라간 마지막 한 장이었을 뿐이다.", choice: {"prompt":"이 사람에게 어떤 시선을 건네고 싶나요?","options":[{"id":"a","label":"이 사람 쪽에서 쌓인 것들을 본다","next":"scene3a"},{"id":"b","label":"상대방 쪽에서 쌓인 것들을 본다","next":"scene3b"}]} },
        scene3a: { text: "이 사람의 '또?'에는 한 글자 이상의 것이 담겨 있었다.", sub: "이 사람은 그동안 여러 번 양보했다고 느끼고 있었다. 일정을 맞추는 건 언제나 자기 쪽이었고, 상대방은 당연하다는 듯이 바꿨다. 하지만 이 사람은 그걸 말로 한 적이 없었다. \"괜찮아\"라고 했다. 괜찮지 않으면서. 터진 건 상대방의 메시지 때문이 아니었다. 자신이 \"괜찮아\"를 너무 많이 말한 것 때문이었다. 밖에서 보면 — 이 다툼은 두 사람 사이의 문제이면서 동시에 이 사람과 이 사람 자신 사이의 문제이기도 하다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"상대방도 비슷한 것을 품고 있었는지 본다","next":"scene4a"},{"id":"b","label":"이 사람이 '괜찮아'를 왜 그렇게 많이 말했는지 본다","next":"scene4b"}]} },
        scene3b: { text: "상대방이 들은 '또?'는 — 예상하지 못한 공격이었다.", sub: "상대방은 단순히 일정 조율을 요청한 것이었다. 바쁜 건 사실이었고, 미안한 마음에 물어본 건데, 돌아온 답이 '또?'였다. 상대방에게도 쌓여 있는 게 있었다. \"나도 바쁜데 너한테 맞추려고 얼마나 노력하는지 모르잖아.\" 그 말도 그날 나왔다. 밖에서 보면, 두 사람 모두 자기가 더 많이 참고 있다고 느끼고 있었다. 둘 다 틀린 건 아니었다. 둘 다 맞는 것도 아니었다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"이 두 사람이 공통적으로 하지 못한 것을 본다","next":"scene4a"},{"id":"b","label":"이 사람이 정말 원했던 건 뭐였는지 본다","next":"scene4b"}]} },
        scene4a: { text: "이 두 사람이 공통적으로 하지 못한 것이 하나 있다.", sub: "\"서운했어\"라는 말. 두 사람 모두 서운함을 직접 말하는 대신 참거나, 다른 말로 돌려 말했다. \"또?\"도, \"나도 바쁜데\"도, 서운하다는 말의 다른 버전이었다. 밖에서 보면 이 다툼은 '누가 잘못했는가'의 문제가 아니라 '누구도 먼저 솔직하지 못했다'는 문제였다. 이것을 아는 것만으로 뭔가 달라지지는 않는다. 하지만 적어도 '내가 잘못한 건 아닌데... 근데 정말 아닌 게 맞나'라는 질문에 대한 답은 조금 달라진다. 잘잘못의 문제가 아니었다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"이 사람이 먼저 연락할 수 있을 것이다","next":"scene5a"},{"id":"b","label":"지금은 이 서먹함을 그대로 두어도 된다","next":"scene5b"}]} },
        scene4b: { text: "이 사람이 정말 원했던 건 사과가 아니었다.", sub: "이 사람은 자신이 상대방에게 화가 났다고 생각했다. 하지만 밖에서 보면, 이 사람이 원했던 건 상대방이 \"미안해\"라고 말하는 게 아니라 \"네가 맞춰줬던 거 알아\"라고 말하는 것이었다. 인정. 그것뿐이었다. 그리고 아마 — 상대방도 비슷한 것을 원하고 있었을 것이다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"이 사람이 먼저 연락할 수 있을 것이다","next":"scene5a"},{"id":"b","label":"지금은 이 서먹함을 그대로 두어도 된다","next":"scene5b"}]} },
        scene5a: { text: "3개월의 침묵은 — 관계가 끝났다는 뜻이 아닐 수 있다.", sub: "두 사람 모두 먼저 연락하지 않은 건, 상대방이 싫어서가 아니라 뭐라고 말해야 할지 몰랐기 때문이다. 첫 문장은 대단할 필요가 없다. \"요즘 어때?\"만으로도 충분할 수 있다.", choice: null },
        scene5b: { text: "지금 이 서먹함은 — 나쁜 것만은 아닐 수 있다.", sub: "이 사람과 상대방은 각자의 시간 속에서 그 다툼을 곱씹고 있을 것이다. 서먹하다는 건 아직 서로를 의식하고 있다는 뜻이기도 하다. 완전히 무관해진 사이라면 서먹하지도 않다.", choice: null },
      },
      immersion: {
        scene1: { text: "3개월째 그 카톡 대화창을 열지 않고 있다.", sub: "마지막 메시지 — \"알겠어 그럼.\" 누가 보냈는지는 기억난다. 그 네 글자 뒤로 아무것도 없다. 시작은 여행이었다. 같이 가기로 한 여행. 일정을 일방적으로 바꾸겠다는 말에 내가 \"또?\"라고 했고, 거기서부터 쌓여 있던 것들이 쏟아졌다.", choice: {"prompt":"어떤 순간으로 돌아가볼까요?","options":[{"id":"a","label":"그 대화가 시작된 순간으로 돌아간다","next":"scene2a"},{"id":"b","label":"그 전에 쌓여 있던 것들을 떠올린다","next":"scene2b"}]} },
        scene2a: { text: "\"나 그날 좀 어려울 것 같은데, 하루 뒤로 밀면 안 될까?\"", sub: "그 메시지를 보고 5분 동안 답을 안 했다. 머릿속에서 여러 문장을 만들었다가 지웠다. 결국 보낸 건 \"또?\" 한 글자. 그 한 글자에 6개월치 서운함을 다 담았다. 나는 그게 정당하다고 느꼈다. \"또가 뭐야\"라는 답이 오고, 통화로 넘어갔다. 40분. 처음 10분은 여행이었고, 나머지 30분은 전혀 다른 이야기였다.", choice: {"prompt":"이 순간을 어떻게 마주하고 싶나요?","options":[{"id":"a","label":"내가 '또?'라고 보낸 순간의 감정을 느껴본다","next":"scene3a"},{"id":"b","label":"상대방이 그걸 받았을 때 어떤 느낌이었을지 생각해본다","next":"scene3b"}]} },
        scene2b: { text: "처음부터 화가 나 있었던 건 아니었다.", sub: "3개월 전 약속을 당일에 취소했을 때 — \"그럴 수 있지.\" 2개월 전 읽씹당했을 때 — \"바빴나 보지.\" 한 달 전 다른 사람과 먼저 약속 잡은 걸 알았을 때 — \"뭐, 그럴 수도.\" 매번 넘겼다. 괜찮다고 말했다. 괜찮지 않으면서. 여행 일정은 — 그 위에 올라간 마지막 한 장이었을 뿐이다.", choice: {"prompt":"이 순간을 어떻게 마주하고 싶나요?","options":[{"id":"a","label":"그때 왜 괜찮다고 말했는지 생각해본다","next":"scene3a"},{"id":"b","label":"상대방도 뭔가를 참고 있었는지 생각해본다","next":"scene3b"}]} },
        scene3a: { text: "\"또?\"를 보내는 순간 — 시원했다.", sub: "솔직히, 시원했다. 그동안 삼켰던 것을 뱉은 기분. 하지만 통화가 길어지면서 시원함은 사라졌다. 상대방도 할 말이 있었다. \"나도 맞추려고 노력했는데 너는 그걸 모르잖아.\" 그 말에 순간 할 말이 없었다. 나는 내가 참은 것만 세고 있었다. 상대방이 참은 것은 세지 않았다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"나도 상대방도 — 서운했다는 말을 못 했던 거다","next":"scene4a"},{"id":"b","label":"내가 정말 원했던 건 사과가 아니었다","next":"scene4b"}]} },
        scene3b: { text: "상대방도 참고 있었을까.", sub: "생각해보면 — 그럴 수도 있다. 내가 \"괜찮아\"라고 할 때, 상대방은 그걸 그대로 믿었을 수도 있다. 아니면 뭔가 느끼면서도 물어보지 않았을 수도 있다. 나도 물어보지 않았으니까. 서로 \"괜찮아\"만 주고받으면서, 괜찮지 않은 것들을 쌓아갔다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"우리 둘 다 솔직하지 못했던 거다","next":"scene4a"},{"id":"b","label":"내가 정말 원했던 건 뭐였는지 생각해본다","next":"scene4b"}]} },
        scene4a: { text: "이 싸움은 잘잘못의 문제가 아니었다.", sub: "나도 서운한 걸 말하지 않았고, 상대방도 말하지 않았다. 둘 다 참았고, 둘 다 터졌다. \"내가 잘못한 건 아닌데... 근데 정말 아닌 게 맞나\" — 이 질문에 대한 답이 조금 바뀐다. 잘잘못의 문제가 아니었다. 타이밍과 솔직함의 문제였다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"내가 먼저 연락해볼 수 있을 것 같다","next":"scene5a"},{"id":"b","label":"지금은 이 서먹함을 좀 더 안고 있어도 된다","next":"scene5b"}]} },
        scene4b: { text: "내가 정말 원했던 건 — \"미안해\"가 아니었다.", sub: "\"네가 맞춰줬던 거 알아.\" 이 한마디. 그것뿐이었다. 사과보다 인정이 필요했다. 내가 양보했던 것들이 눈에 보이지 않게 사라지는 느낌이 싫었다. 그리고 아마 — 상대방도 비슷한 걸 원하고 있었을 것이다.", choice: {"prompt":"이 이야기를 어떻게 마무리할까요?","options":[{"id":"a","label":"내가 먼저 연락해볼 수 있을 것 같다","next":"scene5a"},{"id":"b","label":"지금은 이 서먹함을 좀 더 안고 있어도 된다","next":"scene5b"}]} },
        scene5a: { text: "3개월의 침묵이 — 끝은 아닐 수 있다.", sub: "먼저 연락하지 않은 건 싫어서가 아니라 뭐라고 말해야 할지 몰랐기 때문이다. 첫 문장은 대단할 필요 없다. \"요즘 어때?\"면 될 수 있다.", choice: null },
        scene5b: { text: "이 서먹함은 나쁜 것만은 아닐 수 있다.", sub: "서먹하다는 건 아직 서로를 의식하고 있다는 뜻이다. 완전히 끝난 사이라면 서먹하지도 않다. 지금은 이 거리가 필요한 시간일 수 있다.", choice: null },

      future: {
        scene1: { text: "10년 뒤, 당신은 그 다툼을 떠올리고 있다.", sub: "이상한 건 — \"너는 맨날 그러잖아\"라는 말은 기억나는데, 여행을 어디로 가려고 했는지는 기억나지 않는다. 제주도였나, 강릉이었나. 10년 전에는 그게 전부인 것 같았다. 3개월의 침묵이 영원처럼 느껴졌다. 10년 뒤의 당신은 — 그 3개월이 어떻게 됐는지를 안다.", choice: {"prompt":"어떤 시선을 보내고 싶나요?","options":[{"id":"a","label":"그때의 나에게 가본다","next":"scene2a"},{"id":"b","label":"그 뒤에 이 관계가 어떻게 됐는지 따라가본다","next":"scene2b"}]} },
        scene2a: { text: "10년 뒤의 당신이, 핸드폰을 내려다보고 있는 그때의 나를 본다.", sub: "\"알겠어 그럼\"이라고 보낸 뒤, 화면을 끄고, 침대에 누워서 천장을 보고 있다. 화가 나면서도, 어딘가 허전하다. 자기가 옳다고 느끼면서도, 뭔가 찝찝하다. 10년 뒤의 당신은 그 찝찝함의 정체를 안다 — 그건 '내가 틀렸을 수도 있다'는 불안이 아니라, '이대로 멀어지면 어쩌지'라는 두려움이었다.", choice: {"prompt":"그때의 나에게 무슨 말을 건네고 싶나요?","options":[{"id":"a","label":"그 찝찝함의 정체를 말해준다","next":"scene3a"},{"id":"b","label":"그 뒤에 어떻게 됐는지를 말해준다","next":"scene3b"}]} },
        scene2b: { text: "그 뒤의 이야기를 따라가본다.", sub: "3개월의 침묵 뒤에 — 어떻게 됐을까. 10년 뒤의 당신은 안다. 먼저 연락한 건 어느 쪽이었는지, 어떤 말로 시작했는지, 그 뒤로 관계가 어떻게 변했는지. 결말이 어떤 것이든 — 화해했든, 자연스럽게 멀어졌든 — 10년 뒤에서 보면 그 3개월은 영원이 아니었다.", choice: {"prompt":"그때의 나에게 무슨 말을 건네고 싶나요?","options":[{"id":"a","label":"그때의 나에게 이 이야기를 들려준다","next":"scene3a"},{"id":"b","label":"그 관계가 남긴 것을 생각해본다","next":"scene3b"}]} },

const ff = "'Noto Serif KR', serif";
const serif = ff;
function FadeIn({ children, delay = 0, key2 = "" }) {
  const [show, setShow] = useState(false);
  useEffect(() => { const t = setTimeout(() => setShow(true), delay); return () => clearTimeout(t); }, [key2]);
  return <div style={{ opacity: show ? 1 : 0, transform: show ? "translateY(0)" : "translateY(8px)", transition: "all 0.5s ease" }}>{children}</div>;
}
function SlideUp({ children, delay = 0, keyProp = "" }) {
  const [show, setShow] = useState(false);
  useEffect(() => { const t = setTimeout(() => setShow(true), delay); return () => clearTimeout(t); }, [keyProp]);
  return <div style={{ opacity: show ? 1 : 0, transform: show ? "translateY(0)" : "translateY(14px)", transition: "all 0.45s ease" }}>{children}</div>;
}
function GuideAvatar({ accent = "#5A5A50", size = 34 }) { return <div style={{ width: size, height: size, borderRadius: "50%", background: `${accent}20`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, border: `1.5px solid ${accent}30` }}><span style={{ fontSize: size * 0.4, color: accent }}>◈</span></div>; }
function MemoryProfileCard({ category, situation, emotions, meaning, allEmotions }) {
  const cat = CATEGORIES.find(c => c.id === category);
  return (<div style={{ padding: "14px", background: "#FFF", borderRadius: 10, border: "1px solid #E8E4DE" }}>
    <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.1em", color: "#A0A090", marginBottom: 8 }}>MEMORY PROFILE</div>
    {cat && <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}><span style={{ fontSize: 12, opacity: 0.4 }}>{cat.icon}</span><span style={{ fontSize: 12, fontWeight: 600, color: "#2A2A25" }}>{cat.label}</span></div>}
    {situation && <div style={{ fontSize: 11.5, color: "#5A5A55", lineHeight: 1.55, marginBottom: 6, padding: "6px 8px", background: "#F8F7F4", borderRadius: 6 }}>{situation.length > 80 ? situation.slice(0, 80) + "..." : situation}</div>}
    {emotions.length > 0 && <div style={{ display: "flex", flexWrap: "wrap", gap: 3, marginBottom: 4 }}>{emotions.map(em => { const f = allEmotions.find(e => e.id === em); return <span key={em} style={{ padding: "2px 7px", fontSize: 10, color: "#6A6A65", background: "#F0EDE8", borderRadius: 6 }}>{f?.label || em}</span>; })}</div>}
    {meaning && <div style={{ fontSize: 11, color: "#8A8A80", lineHeight: 1.5, marginTop: 4, fontStyle: "italic" }}>"{meaning.length > 40 ? meaning.slice(0, 40) + "..." : meaning}"</div>}
  </div>);
}

  const resetAll = () => { setStep("intro"); setCategory(null); setSituation(""); setEmotions([]); setStuckPoint(""); setMeaning(""); setEliciterStage("greeting"); setSurvey([0,0,0]); setPerspective(null); setCurrentNode("scene1"); setChoiceHistory([]); setVisitedScenes([]); setShowFullText(false); setDialogueIdx(0); setDialogueInputs({}); setSelectedLesson(null); setReflectText(""); setRevealedField(null); setRpSelectedOption(null); };

  // ─── INTRO ────────────────────────────
  if (step === "intro") return (
    <div style={shell}><div style={{ ...frame, alignItems: "center", justifyContent: "center", textAlign: "center", padding: 40, gap: 10 }}>
      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.18em", color: "#A0A090" }}>REPRISM</div>
      <div style={{ fontSize: 26, fontWeight: 300, color: "#2A2A25", fontFamily: serif, lineHeight: 1.4 }}>하나의 기억, 세 가지 시선</div>
      <div style={{ fontSize: 14, color: "#8A8A80", lineHeight: 1.7, maxWidth: 440, margin: "10px 0 20px" }}>과거의 기억을 세 가지 시점으로 다시 걸어봅니다.<br/>당신의 이야기를 새로운 눈으로 만나보세요.</div>
      <button style={btn(true, "#5A5A50")} onClick={() => { setStep("eliciter"); setEliciterStage("greeting"); }}>시작하기 →</button>
    </div></div>
  );

  // ─── ELICITER AGENT (click-to-fill) ────────────────────────────
  if (step === "eliciter") {
    const script = category ? ELICITER_SCRIPTS[category] : null;
    const catData = CATEGORIES.find(c => c.id === category);

    const agentBubble = (text, key) => (
      <FadeIn key2={key}><div style={{ display: "flex", gap: 10, alignItems: "flex-start", maxWidth: 480, marginBottom: 14 }}>
        <GuideAvatar accent="#5A7FA0" size={30} />
        <div style={{ padding: "13px 17px", background: "#EDF2F7", borderRadius: "4px 14px 14px 14px", fontSize: 14.5, color: "#2A2A25", lineHeight: 1.75, whiteSpace: "pre-line" }}>{text}</div>
      </div></FadeIn>
    );
    const userBubble = (text, key) => (
      <FadeIn key2={key}><div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 14 }}>
        <div style={{ padding: "12px 16px", background: "#5A5A50", color: "#FFF", borderRadius: "14px 4px 14px 14px", maxWidth: 420, fontSize: 14, lineHeight: 1.7, whiteSpace: "pre-line" }}>{text}</div>
      </div></FadeIn>
    );
    const clickToFill = (text, stageId, onSend) => {
      const isRevealed = revealedField === stageId;
      return (
        <div style={{ maxWidth: 460 }}>
          {!isRevealed ? (
            <div onClick={() => setRevealedField(stageId)} style={{ padding: "12px 14px", fontSize: 14, fontFamily: ff, color: "#A0A090", background: "#FFF", border: "1.5px solid #DDDAD3", borderRadius: 9, cursor: "pointer", lineHeight: 1.65, minHeight: 50, transition: "all 0.15s" }} onMouseEnter={e => { e.currentTarget.style.borderColor = "#5A7FA0"; }} onMouseLeave={e => { e.currentTarget.style.borderColor = "#DDDAD3"; }}>편하게 적어주세요...</div>
          ) : (
            <div>
              <div style={{ padding: "12px 14px", fontSize: 14, fontFamily: ff, color: "#2A2A25", background: "#FFF", border: "1.5px solid #5A7FA0", borderRadius: 9, lineHeight: 1.65, whiteSpace: "pre-line" }}>{text}</div>
              <div style={{ marginTop: 8, display: "flex", justifyContent: "flex-end" }}>
                <button style={btn(true, "#5A7FA0")} onClick={() => { setRevealedField(null); onSend(); }}>전달하기 →</button>
              </div>
            </div>
          )}
        </div>
      );
    };
    const userChips = (items, key) => (
      <FadeIn key2={key}><div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 14 }}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 5, justifyContent: "flex-end", maxWidth: 420 }}>
          {items.map(id => { const em = EMOTIONS.find(e => e.id === id); return (<span key={id} style={{ padding: "7px 14px", fontSize: 13, color: "#FFF", background: "#5A5A50", borderRadius: 15, fontWeight: 500 }}>{em ? em.label : id}</span>); })}
        </div>
      </div></FadeIn>
    );

    return (
      <div style={shell}><div style={frame}>
        <div style={topBar}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "#A0A090", letterSpacing: "0.1em" }}>REPRISM</span>
            <span style={{ fontSize: 11, color: "#A0A090" }}>·</span>
            <span style={{ fontSize: 11, color: "#5A7FA0", fontWeight: 600 }}>기억 꺼내기</span>
          </div>
          {progress}
        </div>
        <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
          <div ref={eliciterScrollRef} style={{ flex: 1, padding: "26px 30px 20px", overflowY: "auto", display: "flex", flexDirection: "column" }}>

            {/* GREETING */}
            {agentBubble("안녕하세요! 저는 오늘 당신과 함께 기억 하나를 꺼내고,\n함께 다시 기억을 걸어볼 에이전트에요 :)\n\n편하게 생각하시고, 언제든 멈춰도 괜찮아요.\n어떤 유형의 기억을 다뤄보고 싶으세요?", "greet")}
            {eliciterStage === "greeting" && (
              <FadeIn delay={300}><div style={{ display: "flex", flexDirection: "column", gap: 7, maxWidth: 440, marginLeft: 40, marginBottom: 16 }}>
                {CATEGORIES.map(cat => (
                  <button key={cat.id} disabled={!cat.enabled} onClick={() => { if (cat.enabled) { setCategory(cat.id); setEliciterStage("situation"); } }} style={{ padding: "13px 16px", textAlign: "left", fontFamily: ff, background: cat.enabled ? "#FAFAF7" : "#F5F4F0", border: "1.5px solid #E8E4DE", borderRadius: 10, cursor: cat.enabled ? "pointer" : "not-allowed", transition: "all 0.15s", display: "flex", alignItems: "center", gap: 12, opacity: cat.enabled ? 1 : 0.5 }} onMouseEnter={e => { if (cat.enabled) { e.currentTarget.style.borderColor = "#5A7FA0"; e.currentTarget.style.background = "#EDF2F7"; } }} onMouseLeave={e => { if (cat.enabled) { e.currentTarget.style.borderColor = "#E8E4DE"; e.currentTarget.style.background = "#FAFAF7"; } }}>
                    <span style={{ fontSize: 15, opacity: 0.5 }}>{cat.icon}</span>
                    <div style={{ flex: 1 }}><div style={{ fontSize: 13.5, fontWeight: 600, color: "#2A2A25" }}>{cat.label}</div><div style={{ fontSize: 12, color: "#8A8A80", marginTop: 1 }}>{cat.desc}</div></div>
                    {!cat.enabled && <span style={{ fontSize: 10, color: "#B0B0A5", background: "#ECEAE5", padding: "3px 8px", borderRadius: 10, fontWeight: 600 }}>준비 중</span>}
                  </button>
                ))}
              </div></FadeIn>
            )}

            {/* SITUATION 1 */}
            {["situation","situationFollowup","emotions","stuckpoint","meaning","confirm"].includes(eliciterStage) && script && (
              <>
                {userBubble(catData?.label || "", "u-cat")}
                {agentBubble(`'${catData?.label}'을(를) 골라주셨군요\n그 기억이 어떤 장면인지, 편하게 말씀해주시겠어요?\n자세히 쓰지 않으셔도 괜찮아요.`, "a-sit")}
              </>
            )}
            {eliciterStage === "situation" && script && (
              <FadeIn delay={300}><div style={{ marginLeft: 40, marginBottom: 16 }}>
                {clickToFill(script.situation1, "sit1", () => { setSituation(script.situation1); setEliciterStage("situationFollowup"); })}
              </div></FadeIn>
            )}

            {/* SITUATION FOLLOWUP */}
            {["situationFollowup","emotions","stuckpoint","meaning","confirm"].includes(eliciterStage) && script && (
              <>
                {userBubble(script.situation1, "u-sit1")}
                {agentBubble(script.agentFollowup, "a-followup")}
              </>
            )}
            {eliciterStage === "situationFollowup" && script && (
              <FadeIn delay={400}><div style={{ marginLeft: 40, marginBottom: 16 }}>
                {clickToFill(script.situation2, "sit2", () => { setSituation(script.situation1 + " " + script.situation2); setEliciterStage("emotions"); })}
              </div></FadeIn>
            )}

            {/* EMOTIONS */}
            {["emotions","stuckpoint","meaning","confirm"].includes(eliciterStage) && script && (
              <>
                {userBubble(script.situation2, "u-sit2")}
                {agentBubble("말씀해주셔서 고마워요\n이 기억을 떠올릴 때, 어떤 감정들이 드세요?\n떠오르는 건 여러 개 골라도 괜찮아요!", "a-emo")}
              </>
            )}
            {eliciterStage === "emotions" && script && (
              <FadeIn delay={300}><div style={{ maxWidth: 460, marginLeft: 40, marginBottom: 16 }}>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
                  {EMOTIONS.map(em => { const sel = script.emotions.includes(em.id); return (<button key={em.id} onClick={() => { setEmotions(script.emotions); setEliciterStage("stuckpoint"); }} style={{ padding: "7px 14px", fontSize: 13, fontFamily: ff, fontWeight: sel ? 600 : 400, color: sel ? "#5A7FA0" : "#5A5A50", background: sel ? "#EDF2F7" : "#FFF", border: `1.5px solid ${sel ? "#5A7FA0" : "#D0CEC6"}`, borderRadius: 16, cursor: "pointer", transition: "all 0.15s" }}>{em.label}</button>); })}
                </div>
                <div style={{ fontSize: 11, color: "#A0A090" }}>💡 강조 표시된 감정들을 클릭하면 다음으로 넘어갑니다</div>
              </div></FadeIn>
            )}

            {/* STUCK POINT */}
            {["stuckpoint","meaning","confirm"].includes(eliciterStage) && script && (
              <>
                {userChips(script.emotions, "u-emo")}
                {agentBubble("이 감정들이 꽤 얽혀 있네요.\n혼자 품고 계시기엔 무거웠을 것 같아요.\n\n하나 더 여쭤볼게요.\n이 기억을 떠올릴 때마다 자주 드는 생각이 있으세요?\n'나는 ___한 사람이다' 같은 문장으로 말해보실 수 있을까요?", "a-stuck")}
              </>
            )}
            {eliciterStage === "stuckpoint" && script && (
              <FadeIn delay={300}><div style={{ marginLeft: 40, marginBottom: 16 }}>
                {clickToFill(script.stuckPoint, "stuck", () => { setStuckPoint(script.stuckPoint); setEliciterStage("meaning"); })}
              </div></FadeIn>
            )}

            {/* MEANING */}
            {["meaning","confirm"].includes(eliciterStage) && script && (
              <>
                {userBubble(script.stuckPoint, "u-stuck")}
                {agentBubble("그 말이 꽤 오래 당신을 붙잡고 있었겠어요.\n\n마지막으로 한 가지만 더 여쭤볼게요.\n지금 이 기억이 당신에게 어떤 의미로 남아있나요?", "a-mean")}
              </>
            )}
            {eliciterStage === "meaning" && script && (
              <FadeIn delay={300}><div style={{ marginLeft: 40, marginBottom: 16 }}>
                {clickToFill(script.meaning, "mean", () => { setMeaning(script.meaning); setEliciterStage("confirm"); })}
              </div></FadeIn>
            )}

            {/* CONFIRM */}
            {eliciterStage === "confirm" && script && (
              <>
                {userBubble(script.meaning, "u-mean")}
                {agentBubble("고마워요. 당신이 들려주신 기억의 조각들을 옆에 모아두었어요.\n\n이제 준비가 되셨다면, 이 기억을 새로운 시선으로\n다시 걸어볼 수 있어요.\n천천히 가도 괜찮아요.", "a-done")}
                <FadeIn delay={500}><div style={{ marginLeft: 40, marginBottom: 16 }}>
                  <button style={btn(true, "#5A7FA0")} onClick={() => setStep("briefing")}>계속할게요 →</button>
                </div></FadeIn>
              </>
            )}
          </div>

          {/* Right: Memory profile */}
          <div style={{ width: 280, padding: "26px 20px", background: "#F5F4F0", borderLeft: "1px solid #ECEAE5", display: "flex", flexDirection: "column", justifyContent: "center" }}>
            <FadeIn delay={100}><MemoryProfileCard category={category} situation={situation} emotions={emotions} meaning={meaning} allEmotions={EMOTIONS} /></FadeIn>
            {stuckPoint && (
              <FadeIn key2={stuckPoint}><div style={{ marginTop: 10, padding: "10px 12px", background: "#FFF", borderRadius: 8, border: "1px solid #E8E4DE" }}>
                <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.1em", color: "#A0A090", marginBottom: 5 }}>STUCK POINT</div>
                <div style={{ fontSize: 11.5, color: "#4A4A45", lineHeight: 1.55, fontStyle: "italic" }}>"{stuckPoint}"</div>
              </div></FadeIn>
            )}
          </div>
        </div>
      </div></div>
    );
  }

  // ─── BRIEFING ────────────────────────────
  if (step === "briefing") return (
    <div style={shell}><div style={frame}>
      <div style={topBar}><span style={{ fontSize: 12, fontWeight: 600, color: "#A0A090", letterSpacing: "0.1em" }}>REPRISM</span>{progress}</div>
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 40 }}>
        <FadeIn><div style={{ textAlign: "center", maxWidth: 460 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.12em", color: "#A0A090", marginBottom: 16 }}>BRIEFING</div>
          <div style={{ fontSize: 17, fontWeight: 300, color: "#2A2A25", fontFamily: serif, lineHeight: 1.6, marginBottom: 10 }}>지금부터 당신의 기억을<br/>세 가지 시선 중 하나로 다시 걸어봅니다.</div>
          <div style={{ fontSize: 14, color: "#8A8A80", lineHeight: 1.7, marginBottom: 28 }}>이야기의 흐름 속에서 선택지가 나타납니다.<br/>정답은 없습니다. 끌리는 쪽으로 골라주세요.</div>
          <button style={btn(true, "#5A5A50")} onClick={() => setStep("perspective")}>시점 선택하기 →</button>
        </div></FadeIn>
      </div>
    </div></div>
  );

  // ─── PERSPECTIVE SELECTION ────────────────────────────
  if (step === "perspective") return (
    <div style={shell}><div style={frame}>
      <div style={topBar}><span style={{ fontSize: 12, fontWeight: 600, color: "#A0A090", letterSpacing: "0.1em" }}>REPRISM</span>{progress}</div>
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 16, padding: 28 }}>
        {PERSPECTIVES.map((p, i) => (<FadeIn key={p.id} delay={100 + i * 80}><button onClick={() => { setPerspective(p.id); setCurrentNode("scene1"); setChoiceHistory([]); setVisitedScenes([]); setShowFullText(false); setStep("narrative"); }} style={{ width: 220, padding: "28px 18px", textAlign: "center", fontFamily: ff, background: p.bg, border: `1.5px solid ${p.accent}25`, borderRadius: 14, cursor: "pointer", transition: "all 0.2s" }} onMouseEnter={e => { e.currentTarget.style.borderColor = p.accent; e.currentTarget.style.transform = "translateY(-3px)"; }} onMouseLeave={e => { e.currentTarget.style.borderColor = `${p.accent}25`; e.currentTarget.style.transform = "translateY(0)"; }}>
          <div style={{ fontSize: 28, marginBottom: 10, opacity: 0.4 }}>{p.icon}</div>
          <div style={{ fontSize: 14.5, fontWeight: 600, color: "#2A2A25", marginBottom: 3 }}>{p.title}</div>
          <div style={{ fontSize: 12, color: p.accent, fontWeight: 600, marginBottom: 8 }}>{p.subtitle}</div>
          <div style={{ fontSize: 12.5, color: "#6A6A65", lineHeight: 1.6 }}>{p.desc}</div>
        </button></FadeIn>))}
      </div>
    </div></div>
  );

  // ─── NARRATIVE ────────────────────────────
  if (step === "narrative") {
    const scenarioData = SCENARIOS[category];
    const storyNodes = scenarioData?.story[perspective] || scenarioData?.story.observer;
    const node = storyNodes?.[currentNode];
    if (!node) return null;
    const isEnding = !node.choice;
    return (<div style={shell}><div style={{ ...frame, background: bgColor }}>
      <div style={topBar}><div style={{ display: "flex", alignItems: "center", gap: 8 }}><div style={{ width: 7, height: 7, borderRadius: "50%", background: accent }} /><span style={{ fontSize: 12, fontWeight: 600, color: accent }}>{pData?.subtitle}</span></div>{progress}</div>
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "28px 48px" }}>
        <FadeIn key2={currentNode}><div style={{ maxWidth: 520, textAlign: "center" }}>
          <div style={{ fontSize: 18, fontWeight: 300, color: "#2A2A25", fontFamily: serif, lineHeight: 1.65, marginBottom: 14, whiteSpace: "pre-line" }}>{node.text}</div>
          {(showFullText || isEnding) && <div style={{ fontSize: 14.5, color: "#5A5A55", lineHeight: 1.75, marginBottom: 20, whiteSpace: "pre-line", textAlign: "left" }}>{node.sub}</div>}
          {!showFullText && !isEnding && <button style={{ ...btn(true, "transparent"), color: accent, border: `1px solid ${accent}40`, background: "transparent", fontSize: 13 }} onClick={() => setShowFullText(true)}>계속 읽기 ▾</button>}
          {showFullText && node.choice && (
            <SlideUp delay={300} keyProp={currentNode}><div style={{ marginTop: 16 }}>
              <div style={{ fontSize: 13, color: accent, fontWeight: 500, marginBottom: 10 }}>{node.choice.prompt}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>{node.choice.options.map(opt => (
                <button key={opt.id} onClick={() => { setChoiceHistory(p => [...p, opt.label]); setVisitedScenes(p => [...p, currentNode]); setCurrentNode(opt.next); setShowFullText(false); }} style={{ padding: "14px 16px", fontSize: 14, fontFamily: ff, color: "#2A2A25", background: "rgba(255,255,255,0.7)", border: `1.5px solid ${accent}25`, borderRadius: 10, cursor: "pointer", textAlign: "left", transition: "all 0.2s", lineHeight: 1.5 }} onMouseEnter={e => { e.currentTarget.style.borderColor = accent; e.currentTarget.style.background = `${accent}08`; }} onMouseLeave={e => { e.currentTarget.style.borderColor = `${accent}25`; e.currentTarget.style.background = "rgba(255,255,255,0.7)"; }}>{opt.label}</button>
              ))}</div>
            </div></SlideUp>
          )}
          {isEnding && (<FadeIn delay={400}><button style={{ ...btn(true, accent), marginTop: 20 }} onClick={() => { setDialogueIdx(0); setDialogueInputs({}); setStep("roleplay"); }}>역할 체험하기 →</button></FadeIn>)}
        </div></FadeIn>
      </div>
    </div></div>);
  }

  // ─── ROLEPLAY (single click-to-fill, multi-agent, 6 turns) ────────────────────────────
  if (step === "roleplay") {
    const scenarioData = SCENARIOS[category];
    const rpData = scenarioData?.roleplay[perspective] || scenarioData?.roleplay.observer;
    // Inject extraTurn after the agent2 turn (turn with `a` field)
    const rawTurns = rpData.turns;
    const turns = (() => {
      if (!rpData.extraTurn) return rawTurns;
      const agent2Idx = rawTurns.findIndex(t => t.a);
      if (agent2Idx < 0) return rawTurns;
      return [...rawTurns.slice(0, agent2Idx + 1), rpData.extraTurn, ...rawTurns.slice(agent2Idx + 1)];
    })();
    const currentTurn = turns[dialogueIdx];
    const allDone = dialogueIdx >= turns.length;
    const getAgentName = (turn) => turn.a || rpData.agentName;
    const isAgent2 = (turn) => !!turn.a;
    const agent2Color = "#D4726A";

    return (<div style={shell}><div style={{ ...frame, background: bgColor }}>
      <div style={topBar}><div style={{ display: "flex", alignItems: "center", gap: 8 }}><div style={{ width: 7, height: 7, borderRadius: "50%", background: accent }} /><span style={{ fontSize: 12, fontWeight: 600, color: accent }}>{rpData.label} 역할</span></div>{progress}</div>
      <div ref={scrollRef} style={{ flex: 1, padding: "24px 40px", overflowY: "auto", display: "flex", flexDirection: "column", gap: 14 }}>
        {/* Intro */}
        <FadeIn><div style={{ textAlign: "center", padding: "16px 20px", background: `${accent}08`, borderRadius: 10, marginBottom: 4 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: accent, marginBottom: 8 }}>ROLE PLAY</div>
          <div style={{ fontSize: 14.5, color: "#3A3A35", lineHeight: 1.7, whiteSpace: "pre-line" }}>{rpData.intro}</div>
        </div></FadeIn>

        {/* Completed turns */}
        {turns.slice(0, dialogueIdx).map((turn, tIdx) => {
          const tAgent = getAgentName(turn);
          const prevA = tIdx > 0 ? getAgentName(turns[tIdx - 1]) : rpData.agentName;
          const showEntry = tAgent !== prevA;
          const is2 = isAgent2(turn);
          const aColor = is2 ? agent2Color : accent;
          return (
          <div key={`done-${tIdx}`} style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {showEntry && (<div style={{ textAlign: "center", margin: "8px 0", padding: "12px 16px", background: `${agent2Color}10`, borderRadius: 10, border: `1px dashed ${agent2Color}30` }}>
              <span style={{ fontSize: 12, color: agent2Color, fontWeight: 600 }}>💬 {tAgent}이(가) 대화에 참여합니다</span>
            </div>)}
            <div style={{ display: "flex", gap: 10, alignItems: "flex-start", maxWidth: 460 }}>
              <GuideAvatar accent={aColor} size={26} />
              <div>
                <div style={{ fontSize: 10, fontWeight: 600, color: aColor, marginBottom: 3, opacity: 0.7 }}>{tAgent}</div>
                <div style={{ padding: "12px 16px", background: is2 ? `${agent2Color}12` : `${accent}0D`, borderRadius: "4px 12px 12px 12px", fontSize: 14.5, color: "#2A2A25", lineHeight: 1.7, border: is2 ? `1px solid ${agent2Color}20` : "none" }}>{turn.line}</div>
              </div>
            </div>
            {dialogueInputs[tIdx] && (<div style={{ display: "flex", justifyContent: "flex-end" }}>
              <div style={{ padding: "12px 16px", background: accent, borderRadius: "12px 4px 12px 12px", maxWidth: 380, fontSize: 14.5, color: "#FFF", lineHeight: 1.7 }}>{dialogueInputs[tIdx]}</div>
            </div>)}
          </div>
          );
        })}

        {/* Current turn */}
        {!allDone && currentTurn && (() => {
          const tAgent = getAgentName(currentTurn);
          const prevA = dialogueIdx > 0 ? getAgentName(turns[dialogueIdx - 1]) : rpData.agentName;
          const showEntry = tAgent !== prevA;
          const is2 = isAgent2(currentTurn);
          const aColor = is2 ? agent2Color : accent;
          const responseText = currentTurn.options ? currentTurn.options[0] : null;
          return (
          <FadeIn key2={`turn-${dialogueIdx}`}><div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {showEntry && (<div style={{ textAlign: "center", margin: "8px 0", padding: "12px 16px", background: `${agent2Color}10`, borderRadius: 10, border: `1px dashed ${agent2Color}30` }}>
              <span style={{ fontSize: 12, color: agent2Color, fontWeight: 600 }}>💬 {tAgent}이(가) 대화에 참여합니다</span>
            </div>)}
            <div style={{ display: "flex", gap: 10, alignItems: "flex-start", maxWidth: 460 }}>
              <GuideAvatar accent={aColor} size={26} />
              <div>
                <div style={{ fontSize: 10, fontWeight: 600, color: aColor, marginBottom: 3, opacity: 0.7 }}>{tAgent}</div>
                <div style={{ padding: "12px 16px", background: is2 ? `${agent2Color}12` : `${accent}0D`, borderRadius: "4px 12px 12px 12px", fontSize: 14.5, color: "#2A2A25", lineHeight: 1.7, border: is2 ? `1px solid ${agent2Color}20` : "none" }}>{currentTurn.line}</div>
              </div>
            </div>
            {/* User response: single textarea click-to-fill */}
            {responseText ? (
              <SlideUp delay={400} keyProp={`rp-${dialogueIdx}`}><div style={{ display: "flex", justifyContent: "flex-end", marginTop: 4 }}>
                <div style={{ maxWidth: 400, width: "100%" }}>
                  {rpSelectedOption === null ? (
                    <div onClick={() => setRpSelectedOption(responseText)} style={{ padding: "12px 14px", fontSize: 14, fontFamily: ff, color: "#A0A090", background: "#FFF", border: "1.5px solid #DDDAD3", borderRadius: 9, cursor: "pointer", lineHeight: 1.65, minHeight: 45, textAlign: "right" }} onMouseEnter={e => { e.currentTarget.style.borderColor = accent; }} onMouseLeave={e => { e.currentTarget.style.borderColor = "#DDDAD3"; }}>답변을 입력하세요...</div>
                  ) : (
                    <div>
                      <div style={{ padding: "12px 14px", fontSize: 14, fontFamily: ff, color: "#2A2A25", background: "#FFF", border: `1.5px solid ${accent}`, borderRadius: 9, lineHeight: 1.65, textAlign: "right", whiteSpace: "pre-line" }}>{rpSelectedOption}</div>
                      <div style={{ marginTop: 8, display: "flex", justifyContent: "flex-end" }}>
                        <button style={btn(true, accent)} onClick={() => { setDialogueInputs(p => ({ ...p, [dialogueIdx]: rpSelectedOption })); setRpSelectedOption(null); setDialogueIdx(d => d + 1); }}>전송 →</button>
                      </div>
                    </div>
                  )}
                </div>
              </div></SlideUp>
            ) : currentTurn.closing && (
              <FadeIn delay={600}><div style={{ textAlign: "center", marginTop: 12, padding: "16px 20px", background: `${accent}08`, borderRadius: 10 }}>
                <div style={{ fontSize: 14.5, color: "#3A3A35", lineHeight: 1.7, whiteSpace: "pre-line" }}>{currentTurn.closing}</div>
                <button style={{ ...btn(true, accent), marginTop: 14 }} onClick={() => setStep("reflect")}>여정 마무리하기 →</button>
              </div></FadeIn>
            )}
          </div></FadeIn>
          );
        })()}
      </div>
    </div></div>);
  }

  // ─── REFLECT ────────────────────────────
  if (step === "reflect") {
    const lessons = ["이 경험은 나를 더 단단하게 만들었다","완벽하지 않아도 괜찮다는 걸 배웠다","그때의 나는 최선을 다하고 있었다","이 기억이 지금의 나를 만들었다","아직 정리되지 않았지만, 한 걸음 나아간 것 같다","지금은 모르겠지만, 언젠가 이해하게 될 것 같다"];
    return (<div style={shell}><div style={{ ...frame, background: "#FAFAF7" }}>
      <div style={topBar}><span style={{ fontSize: 12, fontWeight: 600, color: "#A0A090", letterSpacing: "0.1em" }}>REPRISM</span>{progress}</div>
      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
        <div style={{ flex: 1, padding: "28px 24px", borderRight: "1px solid #ECEAE5", overflowY: "auto" }}>
          <FadeIn>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.12em", color: "#A0A090", marginBottom: 8 }}>REFLECTION</div>
            <div style={{ fontSize: 17, fontWeight: 300, color: "#2A2A25", fontFamily: serif, lineHeight: 1.6, marginBottom: 6 }}>이 여정에서 가져가고 싶은 의미는?</div>
            <div style={{ fontSize: 13, color: "#A0A090", marginBottom: 18 }}>가장 와닿는 것을 골라주세요.</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>{lessons.map((l, i) => (<button key={i} onClick={() => setSelectedLesson(i)} style={{ padding: "12px 14px", fontSize: 14, fontFamily: ff, textAlign: "left", color: selectedLesson === i ? "#FFF" : "#4A4A45", background: selectedLesson === i ? "#5A5A50" : "transparent", border: `1.5px solid ${selectedLesson === i ? "#5A5A50" : "#E0DDD6"}`, borderRadius: 9, cursor: "pointer", transition: "all 0.15s", lineHeight: 1.5 }}>{l}</button>))}</div>
            {choiceHistory.length > 0 && (<div style={{ marginTop: 18, padding: "12px", background: "#F5F5F0", borderRadius: 9 }}><div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: "#A0A090", marginBottom: 6 }}>나의 선택 기록</div>{choiceHistory.map((ch, i) => (<div key={i} style={{ fontSize: 13, color: "#6A6A65", lineHeight: 1.6, marginBottom: 3, display: "flex", gap: 5 }}><span style={{ color: accent, fontWeight: 600 }}>{i + 1}.</span>{ch}</div>))}</div>)}
          </FadeIn>
        </div>
        <div style={{ flex: 1, padding: "28px 24px", display: "flex", flexDirection: "column" }}>
          <FadeIn delay={150}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.12em", color: "#A0A090", marginBottom: 8 }}>FREE WRITING</div>
            <div style={{ fontSize: 15, fontWeight: 300, color: "#2A2A25", fontFamily: serif, lineHeight: 1.6, marginBottom: 14 }}>자유롭게 적어주세요.</div>
            <textarea value={reflectText} onChange={e => setReflectText(e.target.value)} placeholder="이 여정을 걸으면서 든 생각, 느낀 것..." style={{ ...textInput, flex: 1, minHeight: 180, fontFamily: serif, fontSize: 15 }} />
          </FadeIn>
          <FadeIn delay={300}><div style={{ marginTop: 14, display: "flex", justifyContent: "flex-end", gap: 8 }}>
            <button style={{ ...btn(true, "transparent"), color: "#5A5A50", border: "1.5px solid #5A5A5040", background: "transparent" }} onClick={() => { setPerspective(null); setCurrentNode("scene1"); setChoiceHistory([]); setVisitedScenes([]); setShowFullText(false); setDialogueIdx(0); setDialogueInputs({}); setRpSelectedOption(null); setSelectedLesson(null); setReflectText(""); setStep("perspective"); }}>다른 시점으로 ↺</button>
            <button style={btn(selectedLesson !== null)} onClick={() => selectedLesson !== null && setStep("card")}>기억 카드 만들기 →</button>
          </div></FadeIn>
        </div>
      </div>
    </div></div>);
  }

  // ─── CARD ────────────────────────────
  if (step === "card") {
    const lessons = ["이 경험은 나를 더 단단하게 만들었다","완벽하지 않아도 괜찮다는 걸 배웠다","그때의 나는 최선을 다하고 있었다","이 기억이 지금의 나를 만들었다","아직 정리되지 않았지만, 한 걸음 나아간 것 같다","지금은 모르겠지만, 언젠가 이해하게 될 것 같다"];
    return (<div style={shell}><div style={{ ...frame, alignItems: "center", justifyContent: "center", background: "#EEEDEA" }}>
      <FadeIn delay={200}><div style={{ width: 380, background: "#FAFAF7", borderRadius: 14, padding: "36px 28px", textAlign: "center", boxShadow: "0 10px 36px rgba(0,0,0,0.05)", border: "1px solid #E5E2DC" }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.15em", color: "#A0A090", marginBottom: 22 }}>YOUR MEMORY CARD</div>
        <div style={{ fontSize: 22, marginBottom: 6, opacity: 0.45 }}>{pData?.icon}</div>
        <div style={{ fontSize: 12, color: accent, fontWeight: 600, marginBottom: 22 }}>{pData?.title}의 시선</div>
        <div style={{ fontFamily: serif, fontSize: 16, color: "#2A2A25", lineHeight: 1.7, marginBottom: 20, padding: "0 8px" }}>"{selectedLesson !== null ? lessons[selectedLesson] : ""}"</div>
        <div style={{ width: 36, height: 1.5, background: "#D8D5CD", margin: "0 auto 18px" }} />
        <div style={{ display: "flex", flexWrap: "wrap", gap: 5, justifyContent: "center", marginBottom: 14 }}>{emotions.map(em => { const f = EMOTIONS.find(e => e.id === em); return (<span key={em} style={{ padding: "3px 10px", fontSize: 11.5, color: "#6A6A65", background: "#F0EDE8", borderRadius: 8 }}>{f?.label || em}</span>); })}</div>
        {stuckPoint && <div style={{ fontSize: 11, color: "#8A8A80", fontStyle: "italic", marginBottom: 10 }}>"{stuckPoint}"</div>}
        <div style={{ fontSize: 11, fontWeight: 600, color: accent, marginBottom: 6 }}>선택의 여정</div>
        <div style={{ display: "flex", gap: 3, justifyContent: "center", marginBottom: 14 }}>{choiceHistory.map((_, i) => (<div key={i} style={{ width: 8, height: 8, borderRadius: "50%", background: accent, opacity: 0.3 + i * 0.2 }} />))}</div>
        <div style={{ fontSize: 11, color: "#B0ACA3" }}>{new Date().toLocaleDateString("ko-KR", { year: "numeric", month: "long", day: "numeric" })}</div>
      </div></FadeIn>
      <FadeIn delay={700}><div style={{ marginTop: 24, textAlign: "center" }}>
        <div style={{ fontSize: 14, color: "#6A6A65", marginBottom: 18 }}>오늘의 여정이 끝났습니다.</div>
        <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
          <button style={{ ...btn(true, "transparent"), color: "#5A5A50", border: "1.5px solid #5A5A5040", background: "transparent" }} onClick={() => { setPerspective(null); setCurrentNode("scene1"); setChoiceHistory([]); setVisitedScenes([]); setShowFullText(false); setDialogueIdx(0); setDialogueInputs({}); setRpSelectedOption(null); setSelectedLesson(null); setReflectText(""); setStep("perspective"); }}>다른 시점으로 걸어보기 ↺</button>
          <button style={btn(true, "#5A5A50")} onClick={resetAll}>처음으로 →</button>
        </div>
      </div></FadeIn>
    </div></div>);
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ReframeGame));
</script>
</body>
</html>
